<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinela Verde</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #3C464C;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #status-bar {
            height: 40px;
            background-color: #3C464C;
            color: #F0EBE4;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            font-size: 14px;
            border-bottom: 3px solid #F48030;
        }

        .status-info {
            display: flex;
            gap: 20px;
        }

        .status-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .filter-select {
            background-color: #F0EBE4;
            color: #3C464C;
            border: 1px solid #F68C29;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: #F48030;
            box-shadow: 0 0 0 2px rgba(244, 128, 48, 0.25);
        }

        #refresh-btn {
            background-color: #F48030;
            color: #3C464C;
            border: none;
            padding: 5px 15px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        #refresh-btn:hover {
            background-color: #F68C29;
        }

        #refresh-btn:disabled {
            background-color: #7d878c;
            color: #F0EBE4;
            cursor: not-allowed;
        }

        #map-frame {
            width: 100%;
            height: calc(100vh - 40px);
            border: none;
        }
    </style>
</head>
<body>
    <div id="status-bar">
        <div class="status-info">
            <span id="last-updated">Última atualização: Carregando...</span>
            <span id="total-events">0 focos de incêndio</span>
        </div>
        <div class="status-controls">
            <select id="area-select" class="filter-select">
                <option value="">Todo o estado de Minas Gerais</option>
            </select>
            <button id="refresh-btn">Atualizar</button>
        </div>
    </div>
    <iframe id="map-frame" src="/map"></iframe>

    <script>
        const lastUpdatedEl = document.getElementById('last-updated');
        const totalEventsEl = document.getElementById('total-events');
        const refreshBtn = document.getElementById('refresh-btn');
        const mapFrame = document.getElementById('map-frame');
        const areaSelect = document.getElementById('area-select');

        const DEFAULT_AREA = '1COB';

        function updateMapFrame() {
            const area = areaSelect.value;
            const base = '/map';
            const t = new Date().getTime();
            const params = new URLSearchParams({ t });

            if (area) {
                params.set('area', area);
            }

            mapFrame.src = `${base}?${params.toString()}`;
        }

        async function updateStatus() {
            try {
                const area = areaSelect.value;
                const url = area ? `/api/status?area=${encodeURIComponent(area)}` : '/api/status';
                const response = await fetch(url);
                const data = await response.json();

                const timestamp = data.last_fetch_at || 'Nunca';
                lastUpdatedEl.textContent = `Última atualização: ${timestamp}`;
                totalEventsEl.textContent = `${data.total_events || 0} focos de incêndio`;
            } catch (error) {
                console.error('Erro ao buscar status:', error);
            }
        }

        async function loadAreas() {
            try {
                const response = await fetch('/api/areas');
                const areas = await response.json();
                areas.forEach(area => {
                    const opt = document.createElement('option');
                    opt.value = area.id;
                    opt.textContent = `${area.name} (${area.region})`;
                    areaSelect.appendChild(opt);
                });
                areaSelect.value = DEFAULT_AREA;
                updateMapFrame();
                updateStatus();
            } catch (e) {
                console.error('Falha ao carregar áreas', e);
            }
        }

        async function handleRefresh() {
            refreshBtn.disabled = true;
            refreshBtn.textContent = 'Atualizando...';
            
            try {
                const response = await fetch('/api/fetch', { method: 'POST' });
                if (response.ok) {
                    updateMapFrame();
                    await updateStatus();
                } else {
                    alert('Falha ao buscar novos dados.');
                }
            } catch (error) {
                console.error('Erro durante a atualização:', error);
                alert('Ocorreu um erro durante a atualização.');
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = 'Atualizar';
            }
        }

        refreshBtn.addEventListener('click', handleRefresh);
        areaSelect.addEventListener('change', () => {
            updateMapFrame();
            updateStatus();
        });

        loadAreas();
        updateStatus();
        setInterval(updateStatus, 5 * 60 * 1000);
    </script>
</body>
</html>
